name: Auto Update Fuel Prices

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Scraper Script
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "JSR-OS Bot"
          git config --global user.email "bot@jsrdigital.in"
          git add fuel_prices.json
          git commit -m "Auto-update daily fuel prices" || exit 0
          git push
          
