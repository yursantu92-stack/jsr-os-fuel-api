name: Auto Update Fuel Prices

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 cloudscraper   # <-- এখানে cloudscraper যোগ করা হয়েছে

      - name: Run Scraper Script
        run: python scraper.py

      - name: Smart Commit and Push
        run: |
          git config --global user.name "JSR-OS Bot"
          git config --global user.email "bot@jsrdigital.in"
          git add fuel_prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily fuel prices" && git pull --rebase origin main && git push)
