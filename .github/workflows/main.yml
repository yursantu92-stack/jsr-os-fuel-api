Name: Auto Update Fuel Prices

on:
  schedule:
    # প্রতিদিন সকাল ৮:০০ টায় (IST) রান করবে (UTC 02:30)
    - cron: '30 2 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'   # <-- স্পিড বাড়ানোর জন্য ক্যাশ মেমোরি ব্যবহার

      - name: Install Superpowers (Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests   # <-- GitHub সার্ভারে অনায়াসে লাইব্রেরি ইন্সটল!

      - name: Run Scraper Script
        run: python scraper.py

      - name: Smart Commit and Push Changes
        run: |
          git config --global user.name "JSR-OS Bot"
          git config --global user.email "bot@jsrdigital.in"
          git add fuel_prices.json
          
          # শুধুমাত্র ডেটা পরিবর্তন হলেই কমিট করবে, নাহলে স্কিপ করবে
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily fuel prices" && git pull --rebase origin main && git push)
